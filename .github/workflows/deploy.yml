name: Build and Deploy Container to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: visit-counter-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: visit-counter
  RESOURCE_GROUP: rg-tarik-container-free
  CONTAINER_NAME: main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Se connecter à Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Se connecter à Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Construire l'image Docker
        run: |
          docker build --no-cache \
            -t "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            .

      - name: Envoyer l'image vers ACR
        run: |
          docker push \
            "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Mettre à jour le SiteContainer Azure
        run: |
          az webapp sitecontainers update \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --container-name "${{ env.CONTAINER_NAME }}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --target-port 3000 \
            --is-main true \
            --system-assigned-identity true \
            --only-show-errors \
            --output none

      - name: Redémarrer l'application
        run: |
          az webapp restart \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}"

      - name: Vérifier l'image configurée
        run: |
          DEPLOYED_IMAGE=$(az webapp sitecontainers show \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --container-name "${{ env.CONTAINER_NAME }}" \
            --query image \
            --output tsv)

          EXPECTED_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          echo "Image attendue : $EXPECTED_IMAGE"
          echo "Image configurée : $DEPLOYED_IMAGE"

          test "$DEPLOYED_IMAGE" = "$EXPECTED_IMAGE"